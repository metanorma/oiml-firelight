name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract and prepare site
        run: |
          unzip -o fl.zip
          mv fl/* .
          rmdir fl

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0

      - name: Rewrite paths for subdirectory deployment
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          bundle exec ruby <<'RUBY'
            require "nokogiri"
            require "fileutils"

            repo = ENV["REPO_NAME"] || "oiml-firelight"

            # Known asset paths loaded dynamically by the app
            ASSET_PATTERNS = %w[
              versions.json
              dependencies.json
              dependency-index.json
              resource-descriptions.json
              resource-map.json
              search-index.json
            ]

            # Fix HTML files with Nokogiri
            Dir.glob("**/*.html").each do |file|
              doc = Nokogiri::HTML(File.read(file))

              # Remove localhost dev server script
              doc.css('script[src^="http://localhost"]').each(&:remove)

              # Set data-path-prefix so the React app knows its subdirectory path
              doc.root["data-path-prefix"] = "/#{repo}"

              # Fix absolute paths to include repository prefix
              doc.css('[href^="/"]').each do |node|
                node["href"] = "/#{repo}#{node["href"]}"
              end
              doc.css('[src^="/"]').each do |node|
                node["src"] = "/#{repo}#{node["src"]}"
              end

              File.write(file, doc.to_html)
            end

            # Fix JS files - only target specific known asset paths
            Dir.glob("**/*.js").each do |file|
              content = File.read(file)
              updated = content

              ASSET_PATTERNS.each do |asset|
                updated = updated.gsub(
                  /"\/(#{Regexp.escape(asset)})"/,
                  "\"/#{repo}/#{asset}\""
                )
              end

              File.write(file, updated) if updated != content
            end
          RUBY

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
