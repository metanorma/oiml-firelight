name: Deploy Firelight to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        collection:
          - { name: 'r060', dir: 'collections/r060', title: 'OIML R 60' }
          # r138-e07 temporarily disabled: content error in anafero-cli
          # - { name: 'r138-e07', dir: 'collections/r138-e07', title: 'OIML R 138 E.07' }
    name: Build ${{ matrix.collection.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create git repo for Firelight
        run: |
          git config --global user.email "ci@metanorma.org"
          git config --global user.name "Metanorma CI"
          git config --global init.defaultBranch main
          rm -rf .git
          git init .
          git add ${{ matrix.collection.dir }}/collection.presentation.xml
          git commit -m "Add presentation XML for ${{ matrix.collection.name }}"

      - name: Create anafero config
        run: |
          cat <<EOF > anafero-config.json
          {
            "version": "0.1",
            "entryPoint": "file:${{ matrix.collection.dir }}/collection.presentation.xml",
            "storeAdapters": [
              "git+https://github.com/metanorma/firelight#main/packages/metanorma-xml-store"
            ],
            "contentAdapters": [
              "git+https://github.com/metanorma/firelight#main/packages/metanorma-site-content"
            ],
            "resourceLayouts": [
              "git+https://github.com/metanorma/firelight#main/packages/plateau-layout"
            ]
          }
          EOF
          git add anafero-config.json
          git commit -m "Add anafero config for ${{ matrix.collection.name }}"

      - name: Build Firelight site for ${{ matrix.collection.name }}
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: |
          npx --node-options='--experimental-vm-modules --max_old_space_size=6144' \
            -y @riboseinc/anafero-cli@0.0.70 build-site \
            --target-dir dist/${{ matrix.collection.name }} \
            --path-prefix /oiml-firelight/${{ matrix.collection.name }} \
            --current-rev main

      - uses: actions/upload-artifact@v4
        with:
          name: fl-${{ matrix.collection.name }}
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Debug artifact structure
        run: find dist -maxdepth 3 -type f | head -30 && echo "---" && ls -la dist/ && echo "---" && ls -la dist/r060/ 2>/dev/null || echo "No r060 directory"

      - name: Create index page
        run: |
          cat <<'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>OIML Firelight Viewer</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; }
              h1 { margin-bottom: 30px; }
              .collection { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
              .collection h2 { margin: 0 0 10px 0; }
              .collection a { font-size: 18px; }
            </style>
          </head>
          <body>
            <h1>OIML Firelight Viewer</h1>
            <div class="collection">
              <h2>OIML R 60</h2>
              <p>Metrological regulation for load cells</p>
              <a href="/oiml-firelight/r060/">Open R 60</a>
            </div>
            <!-- r138-e07 disabled: content processing error, to be re-enabled
            <div class="collection">
              <h2>OIML R 138 E.07</h2>
              <p>Metrological and technical requirements</p>
              <a href="/oiml-firelight/r138-e07/">Open R 138 E.07</a>
            </div>
            -->
          </body>
          </html>
          EOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
