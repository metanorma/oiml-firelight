name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract and prepare site
        run: |
          unzip -o fl.zip
          mv fl/* .
          rmdir fl

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0

      - name: Rewrite paths for subdirectory deployment
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          bundle exec ruby <<'RUBY'
            repo = ENV["REPO_NAME"] || "oiml-firelight"
            prefix = "/#{repo}"

            # Asset paths that React app loads dynamically
            ASSET_PATTERNS = %w[
              versions.json dependencies.json dependency-index.json
              resource-descriptions.json resource-map.json search-index.json
            ]

            # Fix HTML: add data-path-prefix and remove localhost script
            Dir.glob("**/*.html").each do |file|
              content = File.read(file)
              content = content.sub(/(<html\b[^>]*?)(>)/, "\\1 data-path-prefix=\"#{prefix}\"")
              content = content.gsub(/<script\s+src="http:\/\/localhost:\d+"><\/script>\s*/, "")
              File.write(file, content)
            end

            # Fix JS: rewrite asset path strings
            Dir.glob("**/*.js").each do |file|
              content = File.read(file)
              updated = content
              ASSET_PATTERNS.each do |asset|
                updated = updated.gsub(
                  /"\/(#{Regexp.escape(asset)})"/,
                  "\"#{prefix}/#{asset}\""
                )
              end
              File.write(file, updated) if updated != content
            end
          RUBY

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
