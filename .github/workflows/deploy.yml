name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract and prepare site
        run: |
          unzip -o fl.zip
          mv fl/* .
          rmdir fl

      - name: Rewrite HTML paths for subdirectory deployment
        run: |
          # Replace absolute paths with relative paths for GitHub Pages subdirectory deployment
          # Also remove the localhost dev server script tag (spans multiple lines)
          find . -name "*.html" -exec perl -i -0777 -pe \
            's|href="/|href="./|g;
           s|src="/|src="./|g;
           s|<script\s+src="http://localhost:8097"\s*></script>||g' {} +

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
