name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract and prepare site
        run: |
          unzip -o fl.zip
          mv fl/* .
          rmdir fl

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0

      - name: Rewrite HTML paths for subdirectory deployment
        env:
          GITHUB_REPOSITORY: ${{ github.event.repository.full_name }}
        run: |
          # Use Nokogiri for robust HTML path rewriting
          # Prefix absolute paths with repository name for correct GitHub Pages subdirectory resolution
          REPO_NAME="${{ github.event.repository.name }}"
          bundle exec ruby -e '
            require "nokogiri"
            require "fileutils"

            repo = ENV["REPO_NAME"] || "oiml-firelight"

            Dir.glob("**/*.html").each do |file|
              doc = Nokogiri::HTML(File.read(file))

              # Remove localhost dev server script
              doc.css("script[src^=\"http://localhost\"]").each(&:remove)

              # Fix absolute paths to include repository prefix
              doc.css("[href^=\"/\"]").each do |node|
                node["href"] = "/#{repo}#{node["href"]}"
              end
              doc.css("[src^=\"/\"]").each do |node|
                node["src"] = "/#{repo}#{node["src"]}"
              end

              File.write(file, doc.to_html)
            end
          '

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
