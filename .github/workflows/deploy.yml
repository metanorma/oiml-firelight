name: Deploy Firelight to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        collection:
          - { name: 'r060', dir: 'collections/r060', xml: 'collection.presentation.xml', title: 'OIML R 60' }
          - { name: 'r138-e07', dir: 'collections/r138-e07', xml: 'collection.presentation.xml', title: 'OIML R 138 E.07' }
          - { name: 'b022-e23', dir: 'collections/b022-e23', xml: 'document.presentation.xml', title: 'OIML B 022 E.23' }
          - { name: 'd036-e20', dir: 'collections/d036-e20', xml: 'document.presentation.xml', title: 'OIML D 036 E.20' }
          - { name: 'e006-e11', dir: 'collections/e006-e11', xml: 'document.presentation.xml', title: 'OIML E 006 E.11' }
          - { name: 'g021-e17', dir: 'collections/g021-e17', xml: 'document.presentation.xml', title: 'OIML G 021 E.17' }
          - { name: 'r007-e79', dir: 'collections/r007-e79', xml: 'document.presentation.xml', title: 'OIML R 007 E.79' }
          - { name: 'r144-3', dir: 'collections/r144/3', xml: 'document.presentation.xml', title: 'OIML R 144-3' }
    name: Build ${{ matrix.collection.name }}

    steps:
      - name: Checkout oiml-firelight
        uses: actions/checkout@v4

      - name: Checkout firelight with anafero-gui fix
        uses: actions/checkout@v4
        with:
          repository: metanorma/firelight
          ref: fix-todom-array-format
          path: firelight
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build anafero-cli locally
        run: |
          cd firelight/packages/anafero-cli
          corepack enable
          yarn install
          yarn bp
          cd ../..
          CLI_TGZ=$(ls firelight/packages/anafero-cli/dist/riboseinc-anafero-*.tgz | head -1)
          echo "Built CLI: $CLI_TGZ"

      - name: Create git repo for Firelight
        run: |
          git config --global user.email "ci@metanorma.org"
          git config --global user.name "Metanorma CI"
          git config --global init.defaultBranch main
          rm -rf .git
          git init .
          git add ${{ matrix.collection.dir }}/${{ matrix.collection.xml }}
          git commit -m "Add presentation XML for ${{ matrix.collection.name }}"

      - name: Create anafero config
        run: |
          cat <<EOF > anafero-config.json
          {
            "version": "0.1",
            "entryPoint": "file:${{ matrix.collection.dir }}/${{ matrix.collection.xml }}",
            "storeAdapters": [
              "git+https://github.com/metanorma/firelight#fix-todom-array-format/packages/metanorma-xml-store"
            ],
            "contentAdapters": [
              "git+https://github.com/metanorma/firelight#fix-todom-array-format/packages/metanorma-site-content"
            ],
            "resourceLayouts": [
              "git+https://github.com/metanorma/firelight#fix-todom-array-format/packages/plateau-layout"
            ]
          }
          EOF
          git add anafero-config.json
          git commit -m "Add anafero config for ${{ matrix.collection.name }}"

      - name: Build Firelight site for ${{ matrix.collection.name }}
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: |
          CLI_TGZ=$(ls firelight/packages/anafero-cli/dist/riboseinc-anafero-*.tgz | head -1)
          npx --node-options='--experimental-vm-modules --max_old_space_size=6144' \
            -y "$CLI_TGZ" build-site \
            --target-dir dist/${{ matrix.collection.name }} \
            --path-prefix /oiml-firelight/${{ matrix.collection.name }} \
            --current-rev main

      - name: Patch deployed assets
        run: |
          cd dist/${{ matrix.collection.name }}
          # Fix Non-slash-prepended path: return "/" when path equals prefix
          sed -i \
            -e 's~slashPrependedPath\.replace(pathPrefix, "") : slashPrependedPath~slashPrependedPath.replace(pathPrefix, "") || "/" : slashPrependedPath~g' \
            -e 's~siteRootRelative\.replace(versionPrefix, "") : siteRootRelative~siteRootRelative.replace(versionPrefix, "") || "/" : siteRootRelative~g' \
            bootstrap.js
          # Strip source map references for CSS files whose maps aren't deployed
          find . -name '*.css' -exec sed -i '/\/\*# sourceMappingURL/d' {} +

      - uses: actions/upload-artifact@v4
        with:
          name: fl-${{ matrix.collection.name }}
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create index page
        run: |
          cat <<'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>OIML Firelight Viewer</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; }
              h1 { margin-bottom: 30px; }
              .collection { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
              .collection h2 { margin: 0 0 10px 0; font-size: 18px; }
              .collection p { margin: 0 0 10px 0; color: #555; }
              .collection a { font-size: 16px; }
            </style>
          </head>
          <body>
            <h1>OIML Firelight Viewer</h1>
            <div class="collection">
              <h2>OIML R 60</h2>
              <p>Metrological regulation for load cells</p>
              <a href="/oiml-firelight/r060/">Open R 60</a>
            </div>
            <div class="collection">
              <h2>OIML R 138 E.07</h2>
              <p>Vessels for commercial transactions</p>
              <a href="/oiml-firelight/r138-e07/">Open R 138 E.07</a>
            </div>
            <div class="collection">
              <h2>OIML B 022 E.23</h2>
              <p>Policy and rules for the reimbursement of travel expenses incurred by the CIML President</p>
              <a href="/oiml-firelight/b022-e23/">Open B 022 E.23</a>
            </div>
            <div class="collection">
              <h2>OIML D 036 E.20</h2>
              <p>Pipe provers for verification and calibration of measuring systems for liquids</p>
              <a href="/oiml-firelight/d036-e20/">Open D 036 E.20</a>
            </div>
            <div class="collection">
              <h2>OIML E 006 E.11</h2>
              <p>Guidance on the selection and implementation of performance requirements for utility meters</p>
              <a href="/oiml-firelight/e006-e11/">Open E 006 E.11</a>
            </div>
            <div class="collection">
              <h2>OIML G 021 E.17</h2>
              <p>Guidance for defining the requirements for a certification system for prepackages</p>
              <a href="/oiml-firelight/g021-e17/">Open G 021 E.17</a>
            </div>
            <div class="collection">
              <h2>OIML R 007 E.79</h2>
              <p>Clinical thermometers (mercury-in-glass, with maximum device)</p>
              <a href="/oiml-firelight/r007-e79/">Open R 007 E.79</a>
            </div>
            <div class="collection">
              <h2>OIML R 144-3</h2>
              <p>Instruments for continuous measurement of CO, NOx in stationary source emissions &mdash; Test report format</p>
              <a href="/oiml-firelight/r144-3/">Open R 144-3</a>
            </div>
          </body>
          </html>
          EOF

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
