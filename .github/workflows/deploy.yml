name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract and prepare site
        run: |
          unzip -o fl.zip
          mv fl/* .
          rmdir fl

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0

      - name: Rewrite paths for subdirectory deployment
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Only set data-path-prefix on <html> tag - the React app uses this
          # to know its deployment subdirectory. No other changes needed because
          # GitHub Pages serves files from repo root, so absolute paths like
          # /bootstrap.css work correctly.
          bundle exec ruby <<'RUBY'
            repo = ENV["REPO_NAME"] || "oiml-firelight"
            prefix = "/#{repo}"

            Dir.glob("**/*.html").each do |file|
              content = File.read(file)

              # Add data-path-prefix so React app knows its subdirectory
              content = content.sub(/(<html\b[^>]*?)(>)/, "\\1 data-path-prefix=\"#{prefix}\"")

              # Remove localhost dev server script (breaks production)
              content = content.gsub(/<script\s+src="http:\/\/localhost:\d+"><\/script>\s*/, "")

              File.write(file, content)
            end
          RUBY

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
